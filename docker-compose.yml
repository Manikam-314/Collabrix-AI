version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: collabrix-mongo
    hostname: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - collabrix-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: collabrix-qdrant
    ports:
      - "6333:6333"
      - "6033:6033"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - collabrix-net

  ai-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: collabrix-ai-service
    ports:
      - "5000:5000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant
    networks:
      - collabrix-net

  backend:
    build:
      context: ./note-server-spring
      dockerfile: Dockerfile
    container_name: collabrix-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MONGODB_URI=mongodb://mongodb:27017/collabrix
      - PYTHON_SERVICE_URL=http://ai-service:5000
      - JWT_SECRET=${JWT_SECRET:-9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d99a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9}
    depends_on:
      - mongodb
      - ai-service
    networks:
      - collabrix-net

  frontend:
    build:
      context: ./note-client
      dockerfile: Dockerfile
    container_name: collabrix-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - collabrix-net

volumes:
  mongo_data:
  qdrant_data:

networks:
  collabrix-net:
    driver: bridge
